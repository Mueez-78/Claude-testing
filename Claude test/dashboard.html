<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LockrX – Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080c14; --surface: #0f1520; --surface2: #162030;
    --accent: #00d4ff; --accent2: #7b61ff; --accent3: #00ff9d;
    --text: #e8edf5; --muted: #6b7a94; --border: rgba(255,255,255,0.07);
    --error: #ff6464;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* SIDEBAR */
  .layout { display: flex; min-height: 100vh; }

  .sidebar {
    width: 240px; flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 24px 0;
    position: fixed; top: 0; left: 0; bottom: 0;
    z-index: 50;
  }

  .sidebar-logo {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem;
    display: flex; align-items: center; gap: 9px;
    padding: 0 20px 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
    text-decoration: none; color: var(--text);
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 9px; display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
  }
  .sidebar-logo span { color: var(--accent); }

  .nav-item {
    display: flex; align-items: center; gap: 11px;
    padding: 11px 20px; margin: 2px 10px;
    border-radius: 10px;
    color: var(--muted); text-decoration: none;
    font-size: 0.9rem; font-weight: 500;
    transition: all 0.2s; cursor: pointer;
  }
  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active { color: var(--accent); background: rgba(0,212,255,0.08); }
  .nav-icon { font-size: 1rem; width: 20px; text-align: center; }

  .sidebar-bottom {
    margin-top: auto; padding: 16px 10px 0;
    border-top: 1px solid var(--border);
  }

  .user-card {
    display: flex; align-items: center; gap: 10px;
    padding: 12px;
    background: var(--surface2);
    border-radius: 12px;
  }

  .user-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .user-name { font-size: 0.85rem; font-weight: 500; }
  .user-email { font-size: 0.72rem; color: var(--muted); }

  /* MAIN */
  .main { margin-left: 240px; flex: 1; padding: 36px 40px; }

  .page-header {
    display: flex; align-items: flex-start;
    justify-content: space-between; margin-bottom: 32px;
    flex-wrap: wrap; gap: 16px;
  }

  .page-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.7rem; font-weight: 700;
    letter-spacing: -0.02em; margin-bottom: 4px;
  }
  .page-sub { color: var(--muted); font-size: 0.9rem; }

  /* STATS */
  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 16px; margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 20px 24px;
    display: flex; align-items: center; gap: 16px;
  }

  .stat-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
    flex-shrink: 0;
  }
  .si-1 { background: rgba(0,255,157,0.12); }
  .si-2 { background: rgba(255,100,100,0.12); }
  .si-3 { background: rgba(0,212,255,0.12); }

  .stat-val {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem; font-weight: 800; line-height: 1;
  }
  .stat-lbl { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }

  /* FILTER */
  .filter-bar {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 24px; flex-wrap: wrap;
  }

  .filter-label { color: var(--muted); font-size: 0.85rem; }

  .filter-btn {
    padding: 7px 16px; border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.08); }
  .filter-btn.all.active { border-color: var(--text); color: var(--text); background: rgba(255,255,255,0.05); }

  /* LOCKER GRID */
  .locker-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
  }

  .locker-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 20px 16px 18px;
    text-align: center;
    cursor: pointer; transition: all 0.3s;
    position: relative; overflow: hidden;
  }

  .locker-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    opacity: 0; transition: opacity 0.3s;
  }
  .locker-card.available::before { background: linear-gradient(90deg, transparent, var(--accent3), transparent); }
  .locker-card.occupied::before { background: linear-gradient(90deg, transparent, var(--error), transparent); }

  .locker-card.available { border-color: rgba(0,255,157,0.15); }
  .locker-card.occupied { border-color: rgba(255,100,100,0.1); opacity: 0.6; cursor: not-allowed; }

  .locker-card.available:hover {
    border-color: rgba(0,255,157,0.4);
    transform: translateY(-4px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.3);
  }
  .locker-card.available:hover::before { opacity: 1; }

  .locker-card.selected {
    border-color: var(--accent) !important;
    background: rgba(0,212,255,0.05);
    box-shadow: 0 0 0 2px rgba(0,212,255,0.2);
    transform: translateY(-4px);
    opacity: 1 !important;
  }

  .locker-big-icon { font-size: 2.2rem; margin-bottom: 10px; }

  .locker-id {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem; font-weight: 800;
    letter-spacing: -0.01em; margin-bottom: 6px;
  }

  .locker-floor {
    font-size: 0.72rem; color: var(--muted); margin-bottom: 10px;
  }

  .locker-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 100px; font-size: 0.68rem; font-weight: 600;
    letter-spacing: 0.05em;
  }
  .badge-avail { background: rgba(0,255,157,0.12); color: var(--accent3); }
  .badge-occ { background: rgba(255,100,100,0.12); color: var(--error); }
  .badge-sel { background: rgba(0,212,255,0.15); color: var(--accent); }

  .locker-size {
    font-size: 0.72rem; color: var(--muted); margin-top: 8px;
  }

  /* PANEL */
  .select-panel {
    position: fixed; bottom: 0; left: 240px; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 20px 40px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 20px;
    transform: translateY(100%);
    transition: transform 0.35s ease;
    z-index: 40;
  }
  .select-panel.visible { transform: translateY(0); }

  .panel-info { display: flex; align-items: center; gap: 16px; }
  .panel-icon { font-size: 1.5rem; }
  .panel-name { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
  .panel-sub { color: var(--muted); font-size: 0.8rem; }

  .btn-proceed {
    padding: 12px 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 12px;
    color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; font-weight: 600;
    cursor: pointer; transition: all 0.25s;
    white-space: nowrap;
  }
  .btn-proceed:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,212,255,0.35); }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .main { margin-left: 0; padding: 24px 16px; }
    .select-panel { left: 0; }
    .stats-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <a href="index.html" class="sidebar-logo">
      <div class="logo-icon">🔐</div>
      Lockr<span>X</span>
    </a>
    <a class="nav-item active" href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
    <a class="nav-item" href="history.html"><span class="nav-icon">📋</span> My Bookings</a>
    <a class="nav-item" href="#"><span class="nav-icon">👤</span> Profile</a>
    <a class="nav-item" href="#"><span class="nav-icon">⚙️</span> Settings</a>
    <div class="sidebar-bottom">
      <div class="user-card">
        <div class="user-avatar">AR</div>
        <div>
          <div class="user-name">Ahmad Razif</div>
          <div class="user-email">ahmad@email.com</div>
        </div>
      </div>
      <a class="nav-item" href="index.html" style="margin-top:8px;"><span class="nav-icon">🚪</span> Logout</a>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">Select a Locker</div>
        <div class="page-sub">Choose an available locker to begin your rental</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;font-size:0.8rem;color:var(--muted);">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--accent3);animation:pulse 2s infinite;"></div>
        Live status · Updated now
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon si-1">🔓</div>
        <div>
          <div class="stat-val" id="avail-count">8</div>
          <div class="stat-lbl">Available Lockers</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon si-2">🔒</div>
        <div>
          <div class="stat-val" id="occ-count">4</div>
          <div class="stat-lbl">Occupied Lockers</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon si-3">📦</div>
        <div>
          <div class="stat-val">12</div>
          <div class="stat-lbl">Total Lockers</div>
        </div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <span class="filter-label">Filter:</span>
      <button class="filter-btn all active" onclick="filterLockers('all', this)">All</button>
      <button class="filter-btn" onclick="filterLockers('available', this)">Available</button>
      <button class="filter-btn" onclick="filterLockers('occupied', this)">Occupied</button>
    </div>

    <!-- Locker Grid -->
    <div class="locker-grid" id="locker-grid"></div>
  </main>

  <!-- Selection Panel -->
  <div class="select-panel" id="select-panel">
    <div class="panel-info">
      <div class="panel-icon">🔓</div>
      <div>
        <div class="panel-name" id="panel-name">Locker L-01</div>
        <div class="panel-sub" id="panel-sub">Ground Floor · Standard Size</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;align-items:center;">
      <button onclick="clearSelection()" style="background:none;border:1px solid var(--border);padding:10px 18px;border-radius:10px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.85rem;">Cancel</button>
      <button class="btn-proceed" onclick="window.location.href='booking.html'">Book This Locker →</button>
    </div>
  </div>

</div>

<style>
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
</style>

<script>
const lockers = [
  { id: 'L-01', floor: 'Ground Floor', size: 'Standard', status: 'available' },
  { id: 'L-02', floor: 'Ground Floor', size: 'Standard', status: 'occupied' },
  { id: 'L-03', floor: 'Ground Floor', size: 'Large', status: 'available' },
  { id: 'L-04', floor: 'Ground Floor', size: 'Small', status: 'available' },
  { id: 'L-05', floor: 'Level 1', size: 'Standard', status: 'occupied' },
  { id: 'L-06', floor: 'Level 1', size: 'Standard', status: 'available' },
  { id: 'L-07', floor: 'Level 1', size: 'Large', status: 'available' },
  { id: 'L-08', floor: 'Level 1', size: 'Small', status: 'occupied' },
  { id: 'L-09', floor: 'Level 2', size: 'Standard', status: 'available' },
  { id: 'L-10', floor: 'Level 2', size: 'Standard', status: 'available' },
  { id: 'L-11', floor: 'Level 2', size: 'Large', status: 'occupied' },
  { id: 'L-12', floor: 'Level 2', size: 'Small', status: 'available' },
];

let selectedLocker = null;
let currentFilter = 'all';

function renderLockers() {
  const grid = document.getElementById('locker-grid');
  const filtered = currentFilter === 'all' ? lockers : lockers.filter(l => l.status === currentFilter);
  grid.innerHTML = filtered.map(l => {
    const isSelected = selectedLocker && selectedLocker.id === l.id;
    const icon = l.status === 'occupied' ? '🔒' : isSelected ? '🔐' : '🔓';
    const badgeClass = isSelected ? 'badge-sel' : l.status === 'available' ? 'badge-avail' : 'badge-occ';
    const badgeText = isSelected ? 'SELECTED' : l.status === 'available' ? 'FREE' : 'IN USE';
    const cardClass = isSelected ? 'locker-card selected' : `locker-card ${l.status}`;
    return `
      <div class="${cardClass}" onclick="${l.status === 'available' ? `selectLocker('${l.id}')` : ''}">
        <div class="locker-big-icon">${icon}</div>
        <div class="locker-id">${l.id}</div>
        <div class="locker-floor">${l.floor}</div>
        <div class="locker-badge ${badgeClass}">${badgeText}</div>
        <div class="locker-size">${l.size} Size</div>
      </div>`;
  }).join('');
}

function selectLocker(id) {
  const locker = lockers.find(l => l.id === id);
  selectedLocker = locker;
  document.getElementById('panel-name').textContent = `Locker ${locker.id}`;
  document.getElementById('panel-sub').textContent = `${locker.floor} · ${locker.size} Size`;
  document.getElementById('select-panel').classList.add('visible');
  renderLockers();
  // Save to localStorage equivalent (session storage simulation)
  sessionStorage.setItem('selectedLocker', JSON.stringify(locker));
}

function clearSelection() {
  selectedLocker = null;
  document.getElementById('select-panel').classList.remove('visible');
  renderLockers();
}

function filterLockers(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLockers();
}

renderLockers();
</script>
</body>
</html>
